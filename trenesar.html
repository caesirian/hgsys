<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tablero AVL - Línea Sarmiento</title>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#0f172a;
        color:#f1f5f9;
        overflow:hidden;
    }

    .container{
        display:flex;
        width:100vw;
        height:100vh;
    }

    #map{
        flex:1;
        height:100%;
        z-index:1;
    }

    .sidebar{
        width:380px;
        background:#111827;
        border-left:1px solid #1e293b;
        padding:20px;
        overflow-y:auto;
    }

    .title{
        font-size:22px;
        font-weight:bold;
        margin-bottom:5px;
    }

    .subtitle{
        color:#94a3b8;
        font-size:14px;
        margin-bottom:20px;
    }

    .panel{
        background:#1e293b;
        border-radius:14px;
        padding:16px;
        margin-bottom:18px;
        border:1px solid #334155;
    }

    .panel h2{
        font-size:16px;
        margin-bottom:12px;
        color:#f8fafc;
    }

    .filters{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
    }

    .filter-btn{
        background:#334155;
        border:none;
        color:white;
        padding:10px 14px;
        border-radius:10px;
        cursor:pointer;
        transition:0.2s;
        font-size:14px;
    }

    .filter-btn.active{
        background:#2563eb;
    }

    .legend-item{
        display:flex;
        align-items:center;
        gap:10px;
        margin-bottom:10px;
    }

    .status-dot{
        width:12px;
        height:12px;
        border-radius:50%;
    }

    .normal{
        background:#22c55e;
    }

    .delay{
        background:#f59e0b;
    }

    .interrupt{
        background:#ef4444;
    }

    .arrival-card{
        background:#0f172a;
        border:1px solid #334155;
        padding:12px;
        border-radius:12px;
        margin-bottom:10px;
    }

    .arrival-destination{
        font-weight:bold;
        font-size:15px;
    }

    .arrival-time{
        color:#38bdf8;
        margin-top:5px;
        font-size:14px;
    }

    .station-title{
        margin-bottom:12px;
        color:#93c5fd;
        font-size:15px;
    }

    .refresh{
        margin-top:10px;
        color:#94a3b8;
        font-size:12px;
    }

    .train-marker{
        background:#2563eb;
        border:2px solid white;
        width:16px;
        height:16px;
        border-radius:50%;
        box-shadow:0 0 12px rgba(37,99,235,0.8);
    }

    .towards-once{
        background:#ef4444;
    }

    .towards-moreno{
        background:#22c55e;
    }

    @media(max-width: 900px){

        .container{
            flex-direction:column;
        }

        .sidebar{
            width:100%;
            height:40%;
            border-left:none;
            border-top:1px solid #1e293b;
        }

        #map{
            height:60%;
        }
    }

    .leaflet-popup-content-wrapper{
        background:#111827;
        color:white;
        border-radius:10px;
    }

    .leaflet-popup-tip{
        background:#111827;
    }

</style>
</head>

<body>

<div class="container">

    <div id="map"></div>

    <div class="sidebar">

        <div class="title">Línea Sarmiento</div>
        <div class="subtitle">
            Sistema AVL en tiempo real · Once ↔ Moreno
        </div>

        <div class="panel">
            <h2>Filtrar Sentido</h2>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">
                    Todos
                </button>

                <button class="filter-btn active" data-filter="once">
                    Hacia Once
                </button>

                <button class="filter-btn active" data-filter="moreno">
                    Hacia Moreno
                </button>
            </div>
        </div>

        <div class="panel">
            <h2>Estado del Servicio</h2>

            <div class="legend-item">
                <div class="status-dot normal"></div>
                <span>Normal</span>
            </div>

            <div class="legend-item">
                <div class="status-dot delay"></div>
                <span>Atrasado</span>
            </div>

            <div class="legend-item">
                <div class="status-dot interrupt"></div>
                <span>Interrumpido</span>
            </div>
        </div>

        <div class="panel">
            <h2>Próximos Arribos</h2>

            <div class="station-title">Estación Once</div>
            <div id="arrivals-once"></div>

            <br>

            <div class="station-title">Estación Moreno</div>
            <div id="arrivals-moreno"></div>

            <div class="refresh">
                Actualización automática cada 30 segundos
            </div>
        </div>

    </div>

</div>

<script>

    // =========================================================
    // CONFIGURACIÓN GENERAL
    // =========================================================

    const map = L.map('map', {
        zoomControl:true
    }).setView([-34.6037, -58.592], 11);

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap'
        }
    ).addTo(map);

    // =========================================================
    // RECORRIDO SARMIENTO ONCE - MORENO
    // =========================================================

    const sarmientoLine = [
        [-34.6098, -58.4080], // Once
        [-34.6182, -58.4387], // Caballito
        [-34.6295, -58.4639], // Flores
        [-34.6408, -58.4842], // Floresta
        [-34.6488, -58.5079], // Villa Luro
        [-34.6539, -58.5277], // Liniers
        [-34.6632, -58.5623], // Ciudadela
        [-34.6669, -58.5921], // Ramos
        [-34.6698, -58.6254], // Haedo
        [-34.6687, -58.6559], // Morón
        [-34.6527, -58.7021], // Castelar
        [-34.6400, -58.7295], // Ituzaingó
        [-34.6345, -58.7792], // Merlo
        [-34.6492, -58.8058], // Paso del Rey
        [-34.6348, -58.7910], // Moreno
    ];

    const lineLayer = L.polyline(sarmientoLine, {
        color:'#38bdf8',
        weight:5,
        opacity:0.8
    }).addTo(map);

    map.fitBounds(lineLayer.getBounds(), {
        padding:[20,20]
    });

    // =========================================================
    // ESTACIONES
    // =========================================================

    const stations = [
        {name:'Once', coords:[-34.6098, -58.4080]},
        {name:'Caballito', coords:[-34.6182, -58.4387]},
        {name:'Flores', coords:[-34.6295, -58.4639]},
        {name:'Floresta', coords:[-34.6408, -58.4842]},
        {name:'Villa Luro', coords:[-34.6488, -58.5079]},
        {name:'Liniers', coords:[-34.6539, -58.5277]},
        {name:'Ciudadela', coords:[-34.6632, -58.5623]},
        {name:'Ramos Mejía', coords:[-34.6669, -58.5921]},
        {name:'Haedo', coords:[-34.6698, -58.6254]},
        {name:'Morón', coords:[-34.6687, -58.6559]},
        {name:'Castelar', coords:[-34.6527, -58.7021]},
        {name:'Ituzaingó', coords:[-34.6400, -58.7295]},
        {name:'Merlo', coords:[-34.6345, -58.7792]},
        {name:'Paso del Rey', coords:[-34.6492, -58.8058]},
        {name:'Moreno', coords:[-34.6348, -58.7910]},
    ];

    stations.forEach(station => {
        L.circleMarker(station.coords,{
            radius:5,
            color:'#fff',
            fillColor:'#fff',
            fillOpacity:1
        })
        .bindPopup(`<b>${station.name}</b>`)
        .addTo(map);
    });

    // =========================================================
    // MARCADORES DE TRENES
    // =========================================================

    let trainMarkers = [];

    let filters = {
        once:true,
        moreno:true
    };

    function createTrainIcon(direction){

        const className =
            direction === 'once'
            ? 'train-marker towards-once'
            : 'train-marker towards-moreno';

        return L.divIcon({
            html:`<div class="${className}"></div>`,
            className:'',
            iconSize:[16,16]
        });
    }

    function clearTrainMarkers(){
        trainMarkers.forEach(marker => map.removeLayer(marker));
        trainMarkers = [];
    }

    // =========================================================
    // SIMULACIÓN AVL + GTFS RT
    // =========================================================
    // IMPORTANTE:
    // Reemplazar esta lógica mockeada por el consumo real
    // del feed GTFS-Realtime de Transporte Público BA.
    //
    // Ejemplo:
    // fetch("GTFS_REALTIME_URL")
    //
    // Decodificar protobuf usando:
    // https://github.com/google/transit/tree/master/gtfs-realtime
    //
    // =========================================================

    async function updateTrainPositions(){

        clearTrainMarkers();

        // MOCK DATA
        // Simula trenes sobre la traza
        const trains = [
            {
                id:'S01',
                lat:-34.646,
                lng:-58.520,
                direction:'once',
                status:'Normal'
            },
            {
                id:'S02',
                lat:-34.666,
                lng:-58.610,
                direction:'moreno',
                status:'Atrasado'
            },
            {
                id:'S03',
                lat:-34.642,
                lng:-58.735,
                direction:'once',
                status:'Normal'
            },
            {
                id:'S04',
                lat:-34.635,
                lng:-58.790,
                direction:'moreno',
                status:'Interrumpido'
            }
        ];

        trains.forEach(train => {

            if(train.direction === 'once' && !filters.once){
                return;
            }

            if(train.direction === 'moreno' && !filters.moreno){
                return;
            }

            const marker = L.marker(
                [train.lat, train.lng],
                {
                    icon:createTrainIcon(train.direction)
                }
            )
            .bindPopup(`
                <b>Tren ${train.id}</b><br>
                Sentido: ${
                    train.direction === 'once'
                    ? 'Hacia Once'
                    : 'Hacia Moreno'
                }<br>
                Estado: ${train.status}
            `)
            .addTo(map);

            trainMarkers.push(marker);
        });

    }

    // =========================================================
    // API ARRIBOS SOFSE
    // =========================================================

    async function fetchArrivals(stationId, containerId){

        const container = document.getElementById(containerId);

        container.innerHTML = `
            <div class="arrival-card">
                Cargando arribos...
            </div>
        `;

        try{

            const response = await fetch(
                `https://ariedro.dev/api-trenes/arribos/estacion/${stationId}`
            );

            const data = await response.json();

            container.innerHTML = '';

            // Adaptar según estructura real devuelta
            const arrivals = data.slice(0,5);

            arrivals.forEach(arrival => {

                const div = document.createElement('div');

                div.className = 'arrival-card';

                div.innerHTML = `
                    <div class="arrival-destination">
                        ${arrival.destino || 'Destino'}
                    </div>

                    <div class="arrival-time">
                        ${arrival.hora || '--:--'}
                    </div>
                `;

                container.appendChild(div);
            });

        }catch(error){

            console.error(error);

            container.innerHTML = `
                <div class="arrival-card">
                    No fue posible obtener datos.
                </div>
            `;
        }

    }

    // =========================================================
    // FILTROS
    // =========================================================

    document.querySelectorAll('.filter-btn')
    .forEach(btn => {

        btn.addEventListener('click', () => {

            const filter = btn.dataset.filter;

            if(filter === 'all'){

                const active =
                    btn.classList.contains('active');

                if(active){

                    filters.once = false;
                    filters.moreno = false;

                    document.querySelectorAll('.filter-btn')
                    .forEach(b => b.classList.remove('active'));

                }else{

                    filters.once = true;
                    filters.moreno = true;

                    document.querySelectorAll('.filter-btn')
                    .forEach(b => b.classList.add('active'));
                }

            }else{

                filters[filter] = !filters[filter];

                btn.classList.toggle('active');
            }

            updateTrainPositions();

        });

    });

    // =========================================================
    // ACTUALIZACIÓN GENERAL
    // =========================================================

    async function refreshAll(){

        updateTrainPositions();

        fetchArrivals(1, 'arrivals-once');
        fetchArrivals(16, 'arrivals-moreno');

    }

    refreshAll();

    setInterval(refreshAll, 30000);

    // =========================================================
    // NOTAS DE SEGURIDAD / CORS
    // =========================================================
    //
    // Algunas APIs ferroviarias pueden bloquear requests
    // directos desde navegador por políticas CORS.
    //
    // En producción se recomienda:
    //
    // 1. Utilizar un backend proxy propio:
    //
    //    Frontend -> Tu Backend -> API SOFSE
    //
    // 2. Reenviar cabeceras utilizadas por la app oficial:
    //
    //    Authorization
    //    User-Agent
    //    x-requested-with
    //
    // 3. Implementar caché de 10-30 segundos
    //    para evitar rate limits.
    //
    // 4. Para GTFS-Realtime:
    //    consumir protobuf desde backend Node.js
    //    y exponer JSON normalizado al frontend.
    //
    // =========================================================

</script>

</body>
</html>
