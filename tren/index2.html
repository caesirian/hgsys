<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"

/>

<title>Tren Sarmiento en Línea</title>

<style>

/* =========================
   RESET
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:
    Arial,
    Helvetica,
    sans-serif;

  background:
    #0f172a;

  color:white;

  padding:20px;

}


/* =========================
   STATUS BAR
========================= */

.status-bar{

  width:100%;

  border-radius:16px;

  padding:18px;

  display:flex;

  justify-content:space-between;

  align-items:flex-start;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:24px;

  transition:all .3s ease;

}


/* =========================
   COLORES
========================= */

.status-bar.green{

  background:
    linear-gradient(
      135deg,
      #0d4d2b,
      #0f7a43
    );

  border:
    1px solid rgba(0,255,120,.25);

}

.status-bar.yellow{

  background:
    linear-gradient(
      135deg,
      #5c4b00,
      #8a6f00
    );

  border:
    1px solid rgba(255,214,0,.25);

}

.status-bar.red{

  background:
    linear-gradient(
      135deg,
      #5a0c0c,
      #8f1515
    );

  border:
    1px solid rgba(255,0,0,.25);

}


/* =========================
   SEMAFORO
========================= */

.semaforo{

  width:28px;

  padding:6px 4px;

  border-radius:14px;

  background:#111;

  display:flex;

  flex-direction:column;

  align-items:center;

  gap:5px;

  box-shadow:
    inset 0 0 6px rgba(255,255,255,.08),
    0 2px 6px rgba(0,0,0,.35);

}

.semaforo-luz{

  width:14px;
  height:14px;

  border-radius:50%;

  background:#2a2a2a;

  opacity:.25;

  transition:all .25s ease;

}


/* =========================
   LUCES ACTIVAS
========================= */

.on-rojo{

  background:#ff1744;

  opacity:1;

  box-shadow:
    0 0 10px #ff1744,
    0 0 20px rgba(255,23,68,.45);

}

.on-amarillo{

  background:#ffd600;

  opacity:1;

  box-shadow:
    0 0 10px #ffd600,
    0 0 20px rgba(255,214,0,.45);

}

.on-verde{

  background:#00e676;

  opacity:1;

  box-shadow:
    0 0 10px #00e676,
    0 0 20px rgba(0,230,118,.45);

}


/* =========================
   TEXTOS
========================= */

.status-text{

  font-size:18px;

  font-weight:bold;

  display:block;

  margin-bottom:8px;

}

.status-detail{

  opacity:.9;

  line-height:1.5;

}

.status-source{

  font-size:14px;

}

.status-source a{

  color:white;

  text-decoration:none;

}

.status-source a:hover{

  text-decoration:underline;

}

.last-update-badge{

  opacity:.8;

}


/* =========================
   BOTONES
========================= */

button{

  background:#2563eb;

  color:white;

  border:none;

  padding:12px 18px;

  border-radius:10px;

  cursor:pointer;

  font-weight:bold;

  transition:.2s ease;

}

button:hover{

  transform:translateY(-1px);

  opacity:.92;

}


/* =========================
   PANEL ADMIN
========================= */

#adminPanel{

  margin-top:20px;

  padding:20px;

  border-radius:16px;

  background:
    rgba(255,255,255,.04);

  border:
    1px solid rgba(255,255,255,.08);

}

#adminPanel h3{

  margin-bottom:20px;

}

select,
textarea{

  width:100%;

  max-width:700px;

  border:none;

  border-radius:10px;

  padding:12px;

  margin-top:8px;

  margin-bottom:18px;

  font-size:15px;

}

textarea{

  min-height:140px;

  resize:vertical;

}


/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

  .status-bar{

    flex-direction:column;

  }

}

</style>

</head>

<body>

<!-- =========================
     STATUS BAR
========================= -->

<div
  class="status-bar yellow"
  id="statusBar"
  role="status"
  aria-live="polite"
  aria-label="Estado del servicio"
>

  <div
    style="
      display:flex;
      align-items:center;
      gap:12px;
    "
  >

    <!-- SEMAFORO -->

    <div
      class="semaforo"
      id="semaforo"
      aria-hidden="true"
      title="Semáforo de estado del servicio"
    >

      <div
        class="semaforo-luz"
        id="luzRoja"
      ></div>

      <div
        class="semaforo-luz on-amarillo"
        id="luzAmarilla"
      ></div>

      <div
        class="semaforo-luz"
        id="luzVerde"
      ></div>

    </div>

    <!-- TEXTOS -->

    <div>

      <span
        class="status-text"
        id="statusText"
      >
        ⚠️ Servicio con modificaciones
      </span>

      <div
        class="status-detail"
        id="statusDetail"
      >
        El servicio opera con modificaciones
        en algunos horarios.
      </div>

    </div>

  </div>

  <!-- FUENTE -->

  <div class="status-source">

    <a
      href="https://www.instagram.com/trensarmiento_enlinea"
      target="_blank"
      rel="noopener noreferrer"
    >
      📸 @trensarmiento_enlinea
    </a>

    <br><br>

    <span
      class="last-update-badge"
      id="lastUpdateBadge"
    >
      🕐 Verificado manualmente
    </span>

  </div>

</div>


<!-- =========================
     LOGIN
========================= -->

<div
  style="
    display:flex;
    gap:12px;
    flex-wrap:wrap;
  "
>

  <button id="loginBtn">
    Iniciar sesión
  </button>

  <button
    id="logoutBtn"
    style="display:none;"
  >
    Cerrar sesión
  </button>

</div>


<!-- =========================
     PANEL ADMIN
========================= -->

<div
  id="adminPanel"
  style="display:none;"
>

  <h3>
    Modo edición
  </h3>

  <label for="estadoSelect">
    Estado del servicio
  </label>

  <select id="estadoSelect">

    <option value="verde">
      🟢 Servicio normal
    </option>

    <option value="amarillo">
      🟡 Modificaciones / demoras
    </option>

    <option value="rojo">
      🔴 Servicio interrumpido
    </option>

  </select>

  <label for="editarMensaje">
    Mensaje del alerta
  </label>

  <textarea
    id="editarMensaje"
  ></textarea>

  <button id="guardarBtn">
    Guardar cambios
  </button>

</div>


<!-- =========================
     FIREBASE
========================= -->

<script type="module">

/* =========================
   IMPORTS
========================= */

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey:
    "AIzaSyAZ83BcBLEvVJ1G7hFvI_cqhLSKJpRsH7c",

  authDomain:
    "tren-sarmiento-en-linea.firebaseapp.com",

  projectId:
    "tren-sarmiento-en-linea",

  storageBucket:
    "tren-sarmiento-en-linea.firebasestorage.app",

  messagingSenderId:
    "712333767897",

  appId:
    "1:712333767897:web:c9557e3f2299c9806dfac8",

  measurementId:
    "G-BTW3JDC9DD"

};


/* =========================
   INIT
========================= */

const app =
  initializeApp(firebaseConfig);

const auth =
  getAuth(app);

const db =
  getFirestore(app);

const provider =
  new GoogleAuthProvider();


/* =========================
   ELEMENTOS
========================= */

const loginBtn =
  document.getElementById("loginBtn");

const logoutBtn =
  document.getElementById("logoutBtn");

const adminPanel =
  document.getElementById("adminPanel");

const guardarBtn =
  document.getElementById("guardarBtn");

const estadoSelect =
  document.getElementById("estadoSelect");

const editarMensaje =
  document.getElementById("editarMensaje");

const statusText =
  document.getElementById("statusText");

const statusDetail =
  document.getElementById("statusDetail");

const statusBar =
  document.getElementById("statusBar");

const lastUpdateBadge =
  document.getElementById("lastUpdateBadge");

const luzRoja =
  document.getElementById("luzRoja");

const luzAmarilla =
  document.getElementById("luzAmarilla");

const luzVerde =
  document.getElementById("luzVerde");


/* =========================
   LOGIN
========================= */

loginBtn.addEventListener(
  "click",
  async () => {

    try {

      await signInWithPopup(
        auth,
        provider
      );

    } catch(error) {

      console.error(error);

      alert(
        "Error iniciando sesión"
      );

    }

  }
);


/* =========================
   LOGOUT
========================= */

logoutBtn.addEventListener(
  "click",
  async () => {

    await signOut(auth);

  }
);


/* =========================
   AUTH STATE
========================= */

onAuthStateChanged(
  auth,
  (user) => {

    if(user){

      /* REEMPLAZAR POR TU MAIL */

      const mailAutorizado =
        "TUEMAIL@gmail.com";

      if(
        user.email ===
        mailAutorizado
      ){

        adminPanel.style.display =
          "block";

        loginBtn.style.display =
          "none";

        logoutBtn.style.display =
          "inline-block";

      }

    } else {

      adminPanel.style.display =
        "none";

      loginBtn.style.display =
        "inline-block";

      logoutBtn.style.display =
        "none";

    }

  }
);


/* =========================
   REFERENCIA FIRESTORE
========================= */

const estadoRef =
  doc(
    db,
    "estadoServicio",
    "actual"
  );


/* =========================
   LISTENER REALTIME
========================= */

onSnapshot(
  estadoRef,
  (snapshot) => {

    if(!snapshot.exists()) return;

    const data =
      snapshot.data();

    actualizarSemaforo(
      data.estado
    );

    statusDetail.innerText =
      data.mensaje;

    statusText.innerText =
      obtenerTituloEstado(
        data.estado
      );

    lastUpdateBadge.innerText =
      "🕐 Actualizado: " +
      new Date().toLocaleString();

  }
);


/* =========================
   ACTUALIZAR SEMAFORO
========================= */

function actualizarSemaforo(
  estado
){

  luzRoja.classList.remove(
    "on-rojo"
  );

  luzAmarilla.classList.remove(
    "on-amarillo"
  );

  luzVerde.classList.remove(
    "on-verde"
  );

  statusBar.classList.remove(
    "green",
    "yellow",
    "red"
  );

  switch(estado){

    case "rojo":

      luzRoja.classList.add(
        "on-rojo"
      );

      statusBar.classList.add(
        "red"
      );

      break;

    case "amarillo":

      luzAmarilla.classList.add(
        "on-amarillo"
      );

      statusBar.classList.add(
        "yellow"
      );

      break;

    default:

      luzVerde.classList.add(
        "on-verde"
      );

      statusBar.classList.add(
        "green"
      );

      break;

  }

}


/* =========================
   TITULOS
========================= */

function obtenerTituloEstado(
  estado
){

  switch(estado){

    case "rojo":
      return "🔴 Servicio interrumpido";

    case "amarillo":
      return "⚠️ Servicio con modificaciones";

    default:
      return "🟢 Servicio normal";

  }

}


/* =========================
   GUARDAR
========================= */

guardarBtn.addEventListener(
  "click",
  async () => {

    try {

      const estado =
        estadoSelect.value;

      const mensaje =
        editarMensaje.value;

      await setDoc(
        estadoRef,
        {

          estado,

          mensaje,

          actualizado:
            new Date()
              .toISOString(),

          editor:
            auth.currentUser.email

        }
      );

      alert(
        "Cambios guardados"
      );

    } catch(error){

      console.error(error);

      alert(
        "Error guardando"
      );

    }

  }
);

</script>

</body>
</html>
```
