
<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Tren Sarmiento En Línea</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#081120;
  --card:#111c2f;
  --border:rgba(255,255,255,.08);
  --text:#fff;
  --muted:#94a3b8;
  --blue:#00a8ff;
  --green:#00e676;
  --yellow:#ffd600;
  --red:#ff1744;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  background:
    radial-gradient(circle at top right, rgba(0,168,255,.12), transparent 30%),
    radial-gradient(circle at bottom left, rgba(0,230,118,.08), transparent 30%),
    var(--bg);
  color:var(--text);
}

.admin-card{
  width:100%;
  max-width:520px;
  background:rgba(17,28,47,.94);
  border:1px solid var(--border);
  border-radius:24px;
  padding:32px;
  backdrop-filter:blur(14px);
  box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.logo{
  width:72px;
  height:72px;
  border-radius:18px;
  background:linear-gradient(135deg,#00a8ff,#0057ff);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 22px;
  font-size:34px;
}

h1{
  text-align:center;
  font-size:28px;
  font-weight:800;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  margin-bottom:30px;
  font-size:14px;
}

.preview{
  display:flex;
  gap:18px;
  align-items:center;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  border-radius:18px;
  padding:18px;
  margin-bottom:28px;
}

.semaforo{
  width:34px;
  background:#050505;
  border-radius:18px;
  padding:7px 5px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}

.luz{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#333;
  opacity:.25;
  transition:.25s;
}

.on-rojo{
  background:var(--red);
  opacity:1;
  box-shadow:0 0 16px var(--red);
}

.on-amarillo{
  background:var(--yellow);
  opacity:1;
  box-shadow:0 0 16px var(--yellow);
}

.on-verde{
  background:var(--green);
  opacity:1;
  box-shadow:0 0 16px var(--green);
}

.status-info h2{
  font-size:17px;
  margin-bottom:4px;
}

.status-info p{
  color:var(--muted);
  font-size:13px;
}

.admin-panel{
  display:none;
  margin-top:24px;
}

.form-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  font-weight:600;
}

select,
textarea{
  width:100%;
  border:none;
  border-radius:14px;
  padding:14px;
  font-family:inherit;
  font-size:14px;
  color:white;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.06);
}

textarea{
  resize:vertical;
  min-height:120px;
}

button{
  width:100%;
  border:none;
  border-radius:14px;
  padding:15px;
  font-family:inherit;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:.2s ease;
}

.primary-btn{
  background:linear-gradient(135deg,#00a8ff,#0057ff);
  color:white;
}

.primary-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,168,255,.35);
}

.secondary-btn{
  background:rgba(255,255,255,.08);
  color:white;
  margin-top:12px;
}

.secondary-btn:hover{
  background:rgba(255,255,255,.15);
}

.footer{
  text-align:center;
  margin-top:24px;
  font-size:12px;
  color:var(--muted);
}

@media(max-width:640px){
  .admin-card{
    padding:24px;
  }
}
</style>
</head>
<body>

<div class="admin-card">

  <div class="logo">🚆</div>

  <h1>Panel de Administración</h1>

  <div class="subtitle">
    Tren Sarmiento En Línea
  </div>

  <div class="preview">

    <div class="semaforo">
      <div class="luz" id="luzRoja"></div>
      <div class="luz" id="luzAmarilla"></div>
      <div class="luz" id="luzVerde"></div>
    </div>

    <div class="status-info">
      <h2 id="statusTexto">Servicio normal</h2>
      <p id="statusDetail">Sin alertas activas.</p>
    </div>

  </div>

  <button id="loginBtn" class="primary-btn">
    Iniciar sesión con Google
  </button>

  <button id="logoutBtn" class="secondary-btn" style="display:none;">
    Cerrar sesión
  </button>

  <div class="admin-panel" id="adminPanel">

    <div class="form-group">
      <label for="estadoSelect">Estado del servicio</label>

      <select id="estadoSelect">
        <option value="normal">Servicio normal</option>
        <option value="modificado">Servicio con demoras</option>
        <option value="paro">Servicio interrumpido</option>
      </select>
    </div>

    <div class="form-group">
      <label for="editarMensaje">Mensaje / alerta</label>

      <textarea id="editarMensaje" placeholder="Escribí una alerta para los pasajeros..."></textarea>
    </div>

    <button id="guardarBtn" class="primary-btn">
      Guardar cambios
    </button>

  </div>

  <div class="footer">
    Firebase Auth + Firestore Realtime
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAZ83BcBLEvVJ1G7hFvI_cqhLSKJpRsH7c",
  authDomain: "tren-sarmiento-en-linea.firebaseapp.com",
  projectId: "tren-sarmiento-en-linea",
  storageBucket: "tren-sarmiento-en-linea.firebasestorage.app",
  messagingSenderId: "712333767897",
  appId: "1:712333767897:web:c9557e3f2299c9806dfac8",
  measurementId: "G-BTW3JDC9DD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const adminPanel = document.getElementById("adminPanel");
const guardarBtn = document.getElementById("guardarBtn");
const estadoSelect = document.getElementById("estadoSelect");
const editarMensaje = document.getElementById("editarMensaje");

const estadoRef = doc(db, "estadoServicio", "actual");

let currentUser = null;

loginBtn.addEventListener("click", async () => {

  try {

    await signInWithPopup(auth, provider);

  } catch(error) {

    console.error(error);
    alert("Error iniciando sesión");

  }

});

logoutBtn.addEventListener("click", async () => {

  await signOut(auth);

});

onAuthStateChanged(auth, (user) => {

  currentUser = user;

  if(user) {

    if(user.email === "hernan.garbarino@gmail.com") {

      adminPanel.style.display = "block";
      loginBtn.style.display = "none";
      logoutBtn.style.display = "block";

    } else {

      adminPanel.style.display = "none";
      loginBtn.style.display = "none";
      logoutBtn.style.display = "block";

      alert("Usuario sin permisos");

    }

  } else {

    adminPanel.style.display = "none";
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";

  }

});

onSnapshot(estadoRef, (snapshot) => {

  if(!snapshot.exists()) return;

  const data = snapshot.data();

  actualizarSemaforo(data.estado || "normal");

  document.getElementById("statusDetail").innerText =
    data.mensaje || "Sin alertas activas.";

  estadoSelect.value = data.estado || "normal";
  editarMensaje.value = data.mensaje || "";

});

function actualizarSemaforo(estado){

  const rojo = document.getElementById("luzRoja");
  const amarillo = document.getElementById("luzAmarilla");
  const verde = document.getElementById("luzVerde");

  rojo.classList.remove("on-rojo");
  amarillo.classList.remove("on-amarillo");
  verde.classList.remove("on-verde");

  switch(estado){

    case "paro":

      rojo.classList.add("on-rojo");

      document.getElementById("statusTexto").innerText =
        "Servicio interrumpido";

      break;

    case "modificado":

      amarillo.classList.add("on-amarillo");

      document.getElementById("statusTexto").innerText =
        "Servicio con demoras";

      break;

    default:

      verde.classList.add("on-verde");

      document.getElementById("statusTexto").innerText =
        "Servicio normal";

      break;

  }

}

guardarBtn.addEventListener("click", async () => {

  if(!currentUser){

    alert("Debés iniciar sesión");
    return;

  }

  try {

    await setDoc(estadoRef, {
      estado: estadoSelect.value,
      mensaje: editarMensaje.value.trim(),
      actualizado: new Date().toISOString(),
      editor: currentUser.email
    });

    alert("Cambios guardados correctamente");

  } catch(error) {

    console.error(error);
    alert("Error guardando cambios");

  }

});

</script>

</body>
</html>
