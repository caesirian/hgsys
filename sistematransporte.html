<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tren Sarmiento en Línea – Métricas de Parada</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body { margin:0; padding:0; height:100%; background:#0c0c0c; font-family:system-ui; color:#e0e0e0;}
#app { display:flex; flex-direction:column; height:100%; }
header { padding:10px; text-align:center; background:#111; font-weight:600; }
#status { font-size:0.8rem; opacity:0.85; }
#controls { padding:8px; background:#111; display:flex; flex-direction:column; gap:6px; }
select { padding:8px; border-radius:6px; border:none; font-size:0.9rem; }
#direction, #destInfo { font-size:0.85rem; opacity:0.9; }
#metrics {
  padding:8px;
  background:#0f0f0f;
  font-size:0.8rem;
  max-height:140px;
  overflow:auto;
}
#map { flex:1; }
.train-icon { width: 26px; height: 26px; filter: drop-shadow(0 0 4px rgba(0,229,255,0.6)); }
.station-hit { color:#00e5ff; }
</style>
</head>

<body>
<div id="app">
  <header>
    🚆 Tren Sarmiento en Línea
    <div id="status">Esperando permiso de ubicación…</div>
  </header>

  <div id="controls">
    <label>
      Estación destino:
      <select id="destinationSelect"></select>
    </label>
    <div id="destInfo"></div>
    <div id="direction"></div>
  </div>

  <div id="metrics">
    <strong>Estadísticas de paradas (dwell time):</strong>
    <div id="stats"></div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const stations = [
  { name:"Once", lat:-34.60843445605315, lng:-58.406953744878294, order:0 },
  { name:"Caballito", lat:-34.61917964127605, lng:-58.4436934702321, order:1 },
  { name:"Flores", lat:-34.62784069841297, lng:-58.46605866222143, order:2 },
  { name:"Floresta", lat:-34.63231874819957, lng:-58.48085346218695, order:3 },
  { name:"Villa Luro", lat:-34.636253770170214, lng:-58.50208178545416, order:4 },
  { name:"Liniers", lat:-34.63891286578733, lng:-58.526369712082506, order:5 },
  { name:"Ciudadela", lat:-34.63993245473705, lng:-58.541042322318674, order:6 },
  { name:"Ramos Mejía", lat:-34.640498321397814, lng:-58.56427762921467, order:7 },
  { name:"Haedo", lat:-34.64458523900209, lng:-58.591789162657996, order:8 },
  { name:"Morón", lat:-34.64830301546528, lng:-58.61961852033873, order:9 },
  { name:"Castelar", lat:-34.65209867073312, lng:-58.641937718124275, order:10 },
  { name:"Ituzaingó", lat:-34.65935515537083, lng:-58.666079423302385, order:11 },
  { name:"S. A. de Padua", lat:-34.66565261218575, lng:-58.69832704988376, order:12 },
  { name:"Merlo", lat:-34.664524499459674, lng:-58.72785611491195, order:13 },
  { name:"Paso del Rey", lat:-34.658523331785624, lng:-58.76218789854426, order:14 },
  { name:"Moreno", lat:-34.650403431138976, lng:-58.78973968366113, order:15 }
];

const map = L.map('map').setView([-34.63, -58.55], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map);

stations.forEach(s=>{
  L.circleMarker([s.lat,s.lng],{radius:5,color:'#00e5ff'}).addTo(map).bindPopup(s.name);
});

// Icono SVG
const trainSVG = `
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect x="14" y="10" width="36" height="28" rx="4" fill="#00e5ff"/>
  <rect x="20" y="16" width="10" height="10" rx="2" fill="#0c0c0c"/>
  <rect x="34" y="16" width="10" height="10" rx="2" fill="#0c0c0c"/>
  <circle cx="24" cy="44" r="5" fill="#e0e0e0"/>
  <circle cx="40" cy="44" r="5" fill="#e0e0e0"/>
</svg>`;
const trainIcon = L.divIcon({
  className: '',
  html: `<div class="train-icon">${trainSVG}</div>`,
  iconSize: [26,26],
  iconAnchor: [13,13]
});

let userMarker=null;
let lastPos=null;
let lastTime=null;
let currentStation=null;
let stopStartTime=null;

const stats = JSON.parse(localStorage.getItem("stationStats")||"{}");

function haversine(a,b){
  const R=6371000;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLng=(b.lng-a.lng)*Math.PI/180;
  const la1=a.lat*Math.PI/180, la2=b.lat*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function renderStats(){
  const div=document.getElementById("stats");
  div.innerHTML="";
  Object.keys(stats).forEach(k=>{
    const s=stats[k];
    div.innerHTML += `<div class="station-hit">${k}: ${Math.round(s.total/1000)}s en ${s.count} paradas (prom: ${Math.round(s.total/s.count/1000)}s)</div>`;
  });
}

function nearestStation(pos){
  let min=Infinity, st=null;
  stations.forEach(s=>{
    const d=haversine(pos,{lat:s.lat,lng:s.lng});
    if(d<min){ min=d; st=s; }
  });
  return { station: st, dist: min };
}

navigator.geolocation.watchPosition(pos=>{
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  const now=Date.now();
  const current={lat,lng};

  document.getElementById("status").innerText="Ubicación activa";

  if(!userMarker){
    userMarker=L.marker([lat,lng],{icon:trainIcon}).addTo(map);
    map.setView([lat,lng],14);
  } else {
    userMarker.setLatLng([lat,lng]);
  }

  if(lastPos){
    const dist=haversine(lastPos,current);
    const dt=(now-lastTime)/1000;
    const speed=dist/dt; // m/s

    const {station, dist:distToStation}=nearestStation(current);

    if(speed < 0.6 && distToStation < 60){
      if(!stopStartTime){
        stopStartTime = now;
        currentStation = station.name;
      }
    } else {
      if(stopStartTime && currentStation){
        const dwell = now - stopStartTime;
        stats[currentStation] = stats[currentStation] || { total:0, count:0 };
        stats[currentStation].total += dwell;
        stats[currentStation].count += 1;
        localStorage.setItem("stationStats", JSON.stringify(stats));
        renderStats();
        stopStartTime = null;
        currentStation = null;
      }
    }
  }

  lastPos=current;
  lastTime=now;

}, err=>{
  document.getElementById("status").innerText="Error de geolocalización";
  console.error(err);
},{ enableHighAccuracy:true, maximumAge:0, timeout:15000 });

renderStats();

const select=document.getElementById("destinationSelect");
stations.forEach(s=>{
  const o=document.createElement("option");
  o.value=s.order; o.textContent=s.name;
  select.appendChild(o);
});
select.addEventListener("change", ()=>{
  const st=stations[select.value];
  map.flyTo([st.lat,st.lng],15,{animate:true,duration:1.2});
  document.getElementById("destInfo").innerText="Destino: "+st.name;
});
</script>
</body>
</html>
