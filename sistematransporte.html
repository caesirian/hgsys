<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tren Sarmiento en Vivo – Auditoría Ciudadana</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body { margin:0; padding:0; height:100%; font-family: system-ui, sans-serif; background:#0b0b0b; color:#fff; }
  #map { height: 65vh; }
  .panel { padding: 10px; background: #111; }
  select, button { width:100%; padding:8px; margin:4px 0; font-size:15px; }
  .stats { font-size:13px; line-height:1.4; }
  .kpi { display:flex; gap:8px; flex-wrap:wrap; }
  .kpi div { background:#1a1a1a; padding:6px 8px; border-radius:6px; }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="kpi">
    <div>Estado: <b id="status">Iniciando…</b></div>
    <div>Sentido: <b id="direction">–</b></div>
    <div>Vel. prom.: <b id="avgSpeed">–</b></div>
    <div>ETA: <b id="eta">–</b></div>
  </div>

  <select id="destination">
    <option value="">Seleccionar estación destino</option>
  </select>

  <button id="exportBtn">Exportar métricas (CSV)</button>

  <div class="stats" id="dwellStats"></div>
</div>

<script>
const stations = [
 { name:"Once", lat:-34.60843445605315, lng:-58.406953744878294, order:0 },
 { name:"Caballito", lat:-34.61917964127605, lng:-58.4436934702321, order:1 },
 { name:"Flores", lat:-34.62784069841297, lng:-58.46605866222143, order:2 },
 { name:"Floresta", lat:-34.63231874819957, lng:-58.48085346218695, order:3 },
 { name:"Villa Luro", lat:-34.636253770170214, lng:-58.50208178545416, order:4 },
 { name:"Liniers", lat:-34.63891286578733, lng:-58.526369712082506, order:5 },
 { name:"Ciudadela", lat:-34.63993245473705, lng:-58.541042322318674, order:6 },
 { name:"Ramos Mejía", lat:-34.640498321397814, lng:-58.56427762921467, order:7 },
 { name:"Haedo", lat:-34.64458523900209, lng:-58.591789162657996, order:8 },
 { name:"Morón", lat:-34.64830301546528, lng:-58.61961852033873, order:9 },
 { name:"Castelar", lat:-34.65209867073312, lng:-58.641937718124275, order:10 },
 { name:"Ituzaingó", lat:-34.65935515537083, lng:-58.666079423302385, order:11 },
 { name:"S. A. de Padua", lat:-34.66565261218575, lng:-58.69832704988376, order:12 },
 { name:"Merlo", lat:-34.664524499459674, lng:-58.72785611491195, order:13 },
 { name:"Paso del Rey", lat:-34.658523331785624, lng:-58.76218789854426, order:14 },
 { name:"Moreno", lat:-34.650403431138976, lng:-58.78973968366113, order:15 }
];

const map = L.map('map', { zoomControl:true }).setView([stations[0].lat, stations[0].lng], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(map);

const railLine = L.polyline(stations.map(s=>[s.lat,s.lng]),{ color:'#ff3b3b', weight:4 }).addTo(map);
map.fitBounds(railLine.getBounds());
stations.forEach(s=>L.circleMarker([s.lat,s.lng],{ radius:5, color:'#0ff' }).addTo(map));

stations.forEach(s=>{
  const o=document.createElement("option"); o.value=s.order; o.textContent=s.name; destination.appendChild(o);
});

const locoIcon = L.divIcon({
  html:`<svg width="28" height="28" viewBox="0 0 64 64"><rect x="6" y="24" width="40" height="20" rx="3" fill="#ff3b3b"/><rect x="12" y="14" width="18" height="12" rx="2" fill="#ff3b3b"/><circle cx="16" cy="48" r="5" fill="#fff"/><circle cx="36" cy="48" r="5" fill="#fff"/></svg>`,
  className:'', iconSize:[28,28], iconAnchor:[14,14]
});

let marker=L.marker([stations[0].lat,stations[0].lng],{icon:locoIcon}).addTo(map);

let lastPos=null, lastTime=null, speedSamples=[], dwell={}, stoppedAt=null, destOrder=null;

function snap(latlng){
  let min=Infinity, best=latlng;
  railLine.getLatLngs().forEach(p=>{
    const d=map.distance(latlng,p);
    if(d<min){min=d;best=p;}
  });
  return best;
}

function updateDwell(pos){
  const thr=40, now=Date.now();
  const st=stations.find(s=>map.distance(pos,[s.lat,s.lng])<thr);
  if(st){
    if(!stoppedAt) stoppedAt={ name:st.name, start:now };
  } else if(stoppedAt){
    const dt=Math.round((now-stoppedAt.start)/1000);
    dwell[stoppedAt.name]=(dwell[stoppedAt.name]||0)+dt;
    stoppedAt=null; renderStats();
  }
}

function renderStats(){
  dwellStats.innerHTML="<b>Dwell por estación:</b><br>"+Object.entries(dwell).map(([k,v])=>`${k}: ${v}s`).join("<br>");
}

function computeETA(pos){
  if(destOrder===null) return;
  const dest=stations[destOrder];
  const dist=map.distance(pos,[dest.lat,dest.lng]);
  const avg = speedSamples.length ? speedSamples.reduce((a,b)=>a+b,0)/speedSamples.length : 0;
  if(avg>1){
    eta.textContent = Math.round(dist/avg/60)+" min";
  }
}

destination.onchange = e => destOrder = e.target.value===""?null:parseInt(e.target.value);

exportBtn.onclick = () => {
  let csv="estacion,segundos\n";
  Object.entries(dwell).forEach(([k,v])=>csv+=`${k},${v}\n`);
  const blob=new Blob([csv],{type:"text/csv"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="dwell_sarmiento.csv";
  a.click();
};

navigator.geolocation.watchPosition(pos=>{
  const raw=L.latLng(pos.coords.latitude,pos.coords.longitude);
  const p=snap(raw);
  marker.setLatLng(p);

  if(lastPos && lastTime){
    const d=map.distance(p,lastPos);
    const dt=(Date.now()-lastTime)/1000;
    const v=d/dt;
    speedSamples.push(v); if(speedSamples.length>10) speedSamples.shift();
    avgSpeed.textContent=Math.round(v*3.6)+" km/h";
  }

  updateDwell(p);
  computeETA(p);

  status.textContent="Activo";
  lastPos=p; lastTime=Date.now();
},{ enableHighAccuracy:true, maximumAge:1000, timeout:8000 });
</script>
</body>
</html>
